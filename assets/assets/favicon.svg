<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background so it stays visible on light browser tabs -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#05070d"/>

  <!-- Hexagon: blockchain -->
  <path d="M32 8 L53 20 L53 44 L32 56 L11 44 L11 20 Z"
        fill="none" stroke="url(#favGrad)" stroke-width="4.5"
        stroke-linejoin="round"/>

  <!-- Simplified neural core: 3 nodes + center -->
  <g stroke="url(#favGrad)" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="19"/>
    <line x1="32" y1="32" x2="43" y2="39"/>
    <line x1="32" y1="32" x2="21" y2="39"/>
  </g>

  <g fill="#30ffb2">
    <circle cx="32" cy="19" r="4"/>
    <circle cx="43" cy="39" r="4"/>
    <circle cx="21" cy="39" r="4"/>
  </g>

  <circle cx="32" cy="32" r="5.5" fill="url(#favGrad)"/>
</svg>
